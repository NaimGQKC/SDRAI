name: daily-hitlist

on:
  schedule:
    # 06:00 UTC, Mon/Wed/Fri. 3x/week keeps us inside the PDL free tier (~100
    # records/mo). Switch to "0 6 * * 1-5" once on a paid PDL plan.
    - cron: "0 6 * * 1,3,5"
  workflow_dispatch: {}

permissions:
  contents: write   # needed to commit tracker.csv back to the repo

jobs:
  hitlist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code
        # The cron drafts via `claude -p` (no Anthropic API key). Auth comes from
        # CLAUDE_CODE_OAUTH_TOKEN (generate locally with: claude setup-token).
        run: npm install -g @anthropic-ai/claude-code

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run engine
        env:
          PYTHONUNBUFFERED: "1"   # stream engine logs live (don't buffer until exit)
          # Raw secret; we strip whitespace below because the claude CLI reads the token
          # verbatim and a stray trailing newline becomes an invalid bearer token (401).
          CLAUDE_CODE_OAUTH_TOKEN_RAW: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          PERPLEXITY_API_KEY:      ${{ secrets.PERPLEXITY_API_KEY }}
          PDL_API_KEY:             ${{ secrets.PDL_API_KEY }}
          GMAIL_ADDRESS:           ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:      ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_TO:               ${{ secrets.DIGEST_TO }}
        run: |
          export CLAUDE_CODE_OAUTH_TOKEN="$(printf '%s' "$CLAUDE_CODE_OAUTH_TOKEN_RAW" | tr -d '[:space:]')"
          python main.py --no-mocks

      - name: Commit tracker back
        run: |
          git config user.name  "hitlist-bot"
          git config user.email "actions@github.com"
          git add tracker.csv 2>/dev/null || true
          git diff --staged --quiet || git commit -m "tracker: $(date -u +%F)"
          git push

      - name: Upload digest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest
          path: digest_*.html
          if-no-files-found: ignore
