run:
  # Where the "find people" step gets its names:
  #   perplexity -> Sonar web-search FINDS the people for you (the step you want automated).
  #                 Uses PERPLEXITY_API_KEY. Surfaces publicly-visible people; coverage varies
  #                 but those are exactly the ones you can personalise to.
  #   seed       -> read people_seed.csv (you / Clay export fill it). $0, fully manual.
  #   pdl        -> People Data Labs Person Search API (needs PDL_API_KEY; free tier is tiny).
  discovery_source: perplexity
  people_per_day: 5       # LinkedIn drafts/day (right-level peers + hiring managers)
  emails_per_day: 3       # cold-email drafts/day (founders / C-suite / execs)
  search_size: 6          # people to ask for per company (perplexity), or records pulled (pdl)
  # How drafts get written:
  #   claude_cli -> shells out to `claude -p` (Claude Code). $0, no Anthropic API key.
  #                 Uses your Pro login locally; CLAUDE_CODE_OAUTH_TOKEN in CI.
  #   api        -> Anthropic API (needs ANTHROPIC_API_KEY). Fallback only.
  #   mock       -> canned sample drafts (also forced by --mocks).
  draft_backend: claude_cli
  draft_model: claude-sonnet-4-6        # passed to `claude -p --model`; opus for max quality
  research_model: sonar-pro
  reveal_emails: false                  # true = spend a PDL enrichment credit per queued person

# PDL job_title_levels to keep (valid values: cxo, vp, director, manager, senior,
# partner, owner, entry, training, unpaid). We target hiring managers + senior peers.
seniority_include: ["director", "manager", "senior"]

# Post-filter: any person whose title contains one of these is routed to warm_path.csv,
# never the cold queue (HARD CONSTRAINT #2).
seniority_exclude_titles: ["founder", "co-founder", "ceo", "cto", "chief", "vp", "president", "owner"]

# Broad role set — Alejandro is open to forward-deployed, solutions, applied-AI,
# consulting, product and analyst roles. PDL matches these against job_title; the
# seniority_include filter above keeps results at peer / hiring-manager level.
# (Top-level key is ignored by the code; it only exists to anchor the list below.)
role_sets:
  broad: &broad
    - Forward Deployed Engineer
    - Solutions Engineer
    - Solutions Architect
    - Applied AI Engineer
    - Customer Engineer
    - Implementation Consultant
    - Product Manager
    - Founding Engineer
    - Analyst

# EUROPE ONLY, Spain first. Every company is European-HQ'd (city in the comment).
# main.py fills the daily list top-down and stops at people_per_day, so Spanish
# companies get priority; the rest are backfill + dedup overflow across days.
