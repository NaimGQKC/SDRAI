run:
  people_per_day: 8
  # How drafts get written:
  #   claude_cli -> shells out to `claude -p` (Claude Code). $0, no Anthropic API key.
  #                 Uses your Pro login locally; CLAUDE_CODE_OAUTH_TOKEN in CI.
  #   api        -> Anthropic API (needs ANTHROPIC_API_KEY). Fallback only.
  #   mock       -> canned sample drafts (also forced by --mocks).
  draft_backend: claude_cli
  draft_model: claude-sonnet-4-6        # passed to `claude -p --model`; opus for max quality
  research_model: sonar-pro
  reveal_emails: false                  # true = spend an Apollo enrichment credit per queued person

# Apollo person_seniorities (allowed values: owner, founder, c_suite, partner, vp,
# head, director, manager, senior, entry, intern)
seniority_include: ["head", "director", "senior", "manager"]

# Post-filter: any person whose title contains one of these is routed to warm_path.csv,
# never the cold queue (HARD CONSTRAINT #2).
seniority_exclude_titles: ["founder", "co-founder", "ceo", "cto", "chief", "vp", "president", "owner"]

# Broad role set — Alejandro is open to forward-deployed, solutions, applied-AI,
# consulting, product and analyst roles. Apollo matches these as person_titles; the
# seniority_include filter above keeps results at peer / hiring-manager level.
# (Top-level key is ignored by the code; it only exists to anchor the list below.)
role_sets:
  broad: &broad
    - Forward Deployed Engineer
    - Solutions Engineer
    - Solutions Architect
    - Applied AI Engineer
    - Customer Engineer
    - Implementation Consultant
    - Product Manager
    - Founding Engineer
    - Analyst

# EUROPE ONLY. Every company below is European-HQ'd (city in the comment). main.py
# fills the daily list top-down and stops at people_per_day, so strongest-match /
# best-fit companies come first; the rest are backfill + dedup overflow across days.
targets:
  # --- European GEO/AEO (the "I built your product" angle — VisiMind) ---
  - {company: Peec AI,    domain: peec.ai,        roles: *broad}   # Berlin
  - {company: Otterly,    domain: otterly.ai,     roles: *broad}   # Austria / EU (Gartner Cool Vendor)

  # --- European agentic / Claude-native (Dust uses Claude; n8n = his n8n + agentic work) ---
  - {company: Dust,       domain: dust.tt,        roles: *broad}   # Paris
  - {company: n8n,        domain: n8n.io,         roles: *broad}   # Berlin

  # --- European AI-native / applied-AI shops with forward-deployed + consulting work ---
  - {company: Mistral AI, domain: mistral.ai,     roles: *broad}   # Paris / EMEA
  - {company: ElevenLabs, domain: elevenlabs.io,  roles: *broad}   # London
  - {company: Aleph Alpha, domain: aleph-alpha.com, roles: *broad} # Heidelberg (sovereign/enterprise LLM)
  - {company: Prosper AI, domain: getprosper.ai,  roles: *broad}   # Barcelona — near your warm spot
  - {company: Lovable,    domain: lovable.dev,    roles: *broad}   # Stockholm
  - {company: Synthesia,  domain: synthesia.io,   roles: *broad}   # London
  - {company: DeepL,      domain: deepl.com,      roles: *broad}   # Cologne
  - {company: Qdrant,     domain: qdrant.tech,    roles: *broad}   # Berlin
  - {company: Photoroom,  domain: photoroom.com,  roles: *broad}   # Paris
  - {company: Poolside,   domain: poolside.ai,    roles: *broad}   # Paris
